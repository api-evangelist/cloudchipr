description: >-
  CloudChipr is a cloud cost-management and FinOps platform that
  consolidates AWS, Azure, and GCP spend in a single console and
  automates resource cleanup, rightsizing, and cost governance. The
  product surface centres on dashboards, automated workflows, budget
  alerts, and integrations with email, Slack, Microsoft Teams, Jira,
  and webhooks. CloudChipr exposes an API Reference at
  docs.cloudchipr.com/reference for programmatic access; specific
  endpoints, base URL, and authentication mechanism are documented in
  that portal.
