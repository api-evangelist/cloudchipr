    description: >-
      CloudChipr publishes a developer API Reference at
      docs.cloudchipr.com/reference covering the same multi-cloud
      cost-management capabilities as the web app: connecting cloud
      provider accounts, viewing inventoried resources and rightsizing
      recommendations, running automated workflows, and configuring
      integrations such as Slack, Jira, and webhooks. Specific endpoint
      paths and authentication details are maintained in that portal
      and gated by an account login.
